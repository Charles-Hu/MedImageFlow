name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Show Ruff version
        run: python -m ruff --version

      - name: Show import sorting diff
        run: python -m ruff check . --select I001 --diff

      - name: Run Ruff
        run: python -m ruff check .

  type-check:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Show mypy version
        run: python -m mypy --version

      - name: Run mypy
        run: python -m mypy src

  test:
    name: Pytest Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: [lint, type-check]

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest
